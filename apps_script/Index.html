    // ── Perf chart ────────────────────────────────────────────────────────────
    function _renderPerfChart(runHistory) {
      if (!runHistory || runHistory.length < 2) return '';
      var runs = runHistory.slice(0, 10).reverse();
      var maxDur = 0;
      for (var i = 0; i < runs.length; i++) { if (runs[i].duration_ms > maxDur) maxDur = runs[i].duration_ms; }
      if (!maxDur) return '';
      var H = 56, barW = 20, gap = 4, pad = 10;
      var totalW = runs.length * (barW + gap) - gap + pad * 2;
      var failCount = runs.filter(function(r) { return r.result_state === 'FAILED'; }).length;
      var failRate  = Math.round(failCount / runs.length * 100);
      var svg = '<svg width="' + totalW + '" height="' + H + '" viewBox="0 0 ' + totalW + ' ' + H + '">';
      for (var i = 0; i < runs.length; i++) {
        var r = runs[i];
        var barH = Math.max(4, Math.round((r.duration_ms / maxDur) * (H - 8)));
        var color = r.result_state === 'SUCCESS' ? '#57AB5A' : (r.result_state === 'FAILED' ? '#E5534B' : '#4184E4');
        var x = pad + i * (barW + gap);
        var y = H - barH - 4;
        svg += '<rect x="' + x + '" y="' + y + '" width="' + barW + '" height="' + barH + '" rx="3" fill="' + color + '" opacity=".85">';
        svg += '<title>' + escHtml(r.duration_ms ? formatDuration(r.duration_ms) : '—') + ' · ' + escHtml(r.result_state || r.life_cycle_state || '—') + '</title>';
        svg += '</rect>';
      }
      svg += '</svg>';
      var badge = failRate > 0
        ? '<span class="badge badge-failed" style="font-size:.6rem">' + failRate + '% fail</span>'
        : '<span class="badge badge-success" style="font-size:.6rem">100% OK</span>';
      return '<div class="card" style="margin-top:10px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
          '<div class="detail-section-title" style="margin-bottom:0">' + t('perfChart') + '</div>' +
          badge +
        '</div>' +
        '<div class="perf-chart-wrap">' + svg + '</div>' +
      '</div>';
    }

    // ── DAG ───────────────────────────────────────────────────────────────────
    function _renderDAG(tasks, flakiness) {
      flakiness = flakiness || {};
      if (!tasks || tasks.length < 2) return '';
      var hasDeps = tasks.some(function(t) { return t.depends_on && t.depends_on.length > 0; });
      if (!hasDeps) return '';
      var byKey = {};
      tasks.forEach(function(t) { byKey[t.task_key] = t; });
      var depthMap = {};
      function getDepth(key) {
        if (depthMap[key] !== undefined) return depthMap[key];
        depthMap[key] = 0; // break cycles
        var tk = byKey[key];
        if (!tk || !tk.depends_on || !tk.depends_on.length) return 0;
        var max = 0;
        for (var i = 0; i < tk.depends_on.length; i++) max = Math.max(max, getDepth(tk.depends_on[i]) + 1);
        depthMap[key] = max;
        return max;
      }
      tasks.forEach(function(t) { getDepth(t.task_key); });
      var cols = {}, maxCol = 0;
      tasks.forEach(function(t) {
        var d = depthMap[t.task_key] || 0;
        if (!cols[d]) cols[d] = [];
        cols[d].push(t);
        if (d > maxCol) maxCol = d;
      });
      var NW = 88, NH = 26, GX = 36, GY = 8, PAD = 12;
      var totalH = 0;
      for (var c = 0; c <= maxCol; c++) { var rh = (cols[c] || []).length * (NH + GY) - GY; if (rh > totalH) totalH = rh; }
      var totalW = (maxCol + 1) * (NW + GX) - GX + PAD * 2;
      var pos = {};
      for (var c = 0; c <= maxCol; c++) {
        var ct = cols[c] || [];
        var ch = ct.length * (NH + GY) - GY;
        var sy = (totalH - ch) / 2 + PAD;
        ct.forEach(function(t, idx) {
          var x = PAD + c * (NW + GX);
          var y = sy + idx * (NH + GY);
          pos[t.task_key] = { x: x, y: y };
        });
      }
      var svgH = totalH + PAD * 2;
      var svg = '<svg width="' + totalW + '" height="' + svgH + '" viewBox="0 0 ' + totalW + ' ' + svgH + '" style="display:block">';
      svg += '<defs><marker id="dag-arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#444C56"/></marker></defs>';
      tasks.forEach(function(t) {
        if (!t.depends_on) return;
        t.depends_on.forEach(function(dep) {
          var f = pos[dep], to = pos[t.task_key];
          if (!f || !to) return;
          var x1 = f.x + NW, y1 = f.y + NH/2, x2 = to.x, y2 = to.y + NH/2;
          var mx = (x1 + x2) / 2;
          svg += '<path d="M' + x1 + ',' + y1 + ' C' + mx + ',' + y1 + ' ' + mx + ',' + y2 + ' ' + x2 + ',' + y2 + '" fill="none" stroke="#444C56" stroke-width="1.5" marker-end="url(#dag-arr)"/>';
        });
      });
      tasks.forEach(function(t) {
        var p = pos[t.task_key];
        if (!p) return;
        var s = t.result_state || t.life_cycle_state || '';
        var fill   = s === 'SUCCESS' ? 'rgba(87,171,90,.15)' : (s === 'FAILED' ? 'rgba(229,83,75,.15)' : (s === 'RUNNING' ? 'rgba(65,132,228,.15)' : 'rgba(45,51,59,.8)'));
        var stroke = s === 'SUCCESS' ? '#57AB5A' : (s === 'FAILED' ? '#E5534B' : (s === 'RUNNING' ? '#4184E4' : '#444C56'));
        var tcolor = s === 'SUCCESS' ? '#57AB5A' : (s === 'FAILED' ? '#E5534B' : 'var(--text)');
        var label  = t.task_key.length > 11 ? t.task_key.substring(0, 10) + '…' : t.task_key;
        svg += '<rect x="' + p.x + '" y="' + p.y + '" width="' + NW + '" height="' + NH + '" rx="4" fill="' + fill + '" stroke="' + stroke + '" stroke-width="1.5"/>';
        svg += '<text x="' + (p.x + NW/2) + '" y="' + (p.y + NH/2 + 4) + '" text-anchor="middle" font-size="8.5" font-family="SFMono-Regular,Consolas,monospace" fill="' + tcolor + '">' + escHtml(label) + '</text>';
        var fEntry = flakiness[t.task_key];
        if (fEntry && fEntry.rate >= 0.1) {
          var fPct   = Math.round(fEntry.rate * 100);
          var bColor = fEntry.rate > 0.2 ? '#E5534B' : '#C69026';
          var bx = p.x + NW - 10, by = p.y - 5;
          svg += '<rect x="' + (bx - 10) + '" y="' + (by - 5) + '" width="20" height="11" rx="3" fill="' + bColor + '"/>';
          svg += '<text x="' + bx + '" y="' + (by + 4) + '" text-anchor="middle" font-size="7" font-family="SFMono-Regular,Consolas,monospace" fill="white">' + fPct + '%</text>';
        }
      });
      svg += '</svg>';
      return '<div class="card" style="margin-top:10px;overflow-x:auto"><div class="detail-section-title" style="margin-bottom:8px">' + t('dagTitle') + '</div>' + svg + '</div>';
    }

    // ── Settings ──────────────────────────────────────────────────────────────
    function _loadSettingsTab() {
      _loadWorkspaces();

      // Sync language buttons
      setLang(_lang);
      var sel = document.getElementById('settings-endpoint');
      sel.innerHTML = '<option value="">' + t('loadingEndpoints') + '</option>';
      google.script.run
        .withSuccessHandler(function(endpoints) {
          if (!endpoints || endpoints.length === 0) {
            sel.innerHTML = '<option value="">' + t('noEndpoints') + '</option>';
            return;
          }
          sel.innerHTML = endpoints.map(function(ep) {
            return '<option value="' + escHtml(ep) + '"' + (ep === _config.llm_endpoint ? ' selected' : '') + '>' + escHtml(ep) + '</option>';
          }).join('');
          if (!_config.llm_endpoint && endpoints.length > 0) sel.value = endpoints[0];
        })
        .withFailureHandler(function() { sel.innerHTML = '<option value="">' + t('errorEndpoints') + '</option>'; })
        .getServingEndpoints();

      var card = document.getElementById('settings-pinned-job-card');
      if (_config.pinned_job_id) {
        var safeId = parseInt(_config.pinned_job_id, 10);
        card.innerHTML =
          '<div style="font-size:.8rem;font-weight:600;margin-bottom:8px">' + escHtml(_config.pinned_job_name || _config.pinned_job_id) + '</div>' +
          '<button onclick="doPinJob(' + safeId + ',\'\')" style="padding:7px 12px;background:none;border:1px solid var(--bord);border-radius:4px;color:var(--muted);font-size:.75rem;cursor:pointer">' + t('unpin') + '</button>';
      } else {
        card.innerHTML = '<div style="font-size:.8rem;color:var(--muted)">' + t('noPinnedJob') + '</div>';
      }
      _loadScheduledJobs();

      // Install prompt
      var installEl = document.getElementById('settings-install-content');
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      if (isStandalone) {
        installEl.innerHTML = '<span style="color:var(--green)">&#10003; ' + t('installed') + '</span>';
      } else {
        var ua = navigator.userAgent;
        var isIos = /iPad|iPhone|iPod/.test(ua);
        var isAndroid = /Android/.test(ua);
        if (isIos) {
          installEl.innerHTML =
            '<div style="line-height:1.6">' + t('installIos') + '</div>' +
            '<div style="margin-top:6px;display:flex;align-items:flex-start;gap:8px">' +
              '<span style="font-size:1.2rem;line-height:1">&#9650;</span>' +
              '<span>' + t('installIosStep') + '</span>' +
            '</div>';
        } else if (isAndroid) {
          installEl.innerHTML =
            '<div style="line-height:1.6">' + t('installAndroid') + '</div>' +
            '<div style="margin-top:6px;display:flex;align-items:flex-start;gap:8px">' +
              '<span style="font-size:1.2rem;line-height:1">&#8942;</span>' +
              '<span>' + t('installAndroidStep') + '</span>' +
            '</div>';
        } else {
          installEl.innerHTML = '<span style="color:var(--muted)">' + t('installOther') + '</span>';
        }
      }
    }

    // ── Multi-workspace ─────────────────────────────────────────────────────────
    var _wsData      = { active: 0, workspaces: [] };
    var _wsEditIndex = -1;

    function _loadWorkspaces() {
      google.script.run
        .withSuccessHandler(function(data) { _wsData = data || { active: 0, workspaces: [] }; _renderWorkspaces(); })
        .withFailureHandler(function() {})
        .getWorkspaces();
    }

    function _renderWorkspaces() {
      var el = document.getElementById('settings-workspaces-list');
      if (!el) return;
      var ws = _wsData.workspaces || [];
      if (!ws.length) { el.innerHTML = '<div style="font-size:.78rem;color:var(--muted);padding:4px 0">—</div>'; return; }
      el.innerHTML = ws.map(function(w, i) {
        var isActive = i === _wsData.active;
        var dot = isActive
          ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0"></span>'
          : '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--bord);box-sizing:border-box;flex-shrink:0"></span>';
        return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bordl)">' +
          '<div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;cursor:pointer" onclick="doSwitchWorkspace(' + i + ')">' +
            dot +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-size:.82rem;font-weight:' + (isActive ? '700' : '500') + ';color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + escHtml(w.name) + (isActive ? ' <span style="font-size:.6rem;color:var(--green);font-weight:600">' + t('wsActive') + '</span>' : '') + '</div>' +
              '<div style="font-size:.63rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + escHtml(w.host || '—') + '</div>' +
            '</div>' +
          '</div>' +
          '<button onclick="_showWsForm(' + i + ')" title="Edit" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;line-height:0"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2L6 12l-2.5.5L4 10z"/></svg></button>' +
          (ws.length > 1 ? '<button onclick="doDeleteWorkspace(' + i + ')" title="Delete" style="background:none;border:none;color:var(--red);cursor:pointer;padding:4px;line-height:0"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M6 4V2.5h4V4M5 4l.5 9h5l.5-9"/></svg></button>' : '') +
        '</div>';
      }).join('');
    }

    function _showWsForm(editIndex) {
      _wsEditIndex = (typeof editIndex === 'number') ? editIndex : -1;
      document.getElementById('ws-form').style.display = 'block';
      document.getElementById('ws-add-btn').style.display = 'none';
      var nameEl = document.getElementById('ws-name'), hostEl = document.getElementById('ws-host'), tokenEl = document.getElementById('ws-token');
      if (_wsEditIndex >= 0 && _wsData.workspaces[_wsEditIndex]) {
        var w = _wsData.workspaces[_wsEditIndex];
        nameEl.value = w.name || ''; hostEl.value = w.host || ''; tokenEl.value = '';
        tokenEl.placeholder = t('wsTokenKeep');
      } else {
        nameEl.value = ''; hostEl.value = ''; tokenEl.value = '';
        tokenEl.placeholder = 'dapi...';
      }
      nameEl.focus();
    }
    function _hideWsForm() {
      document.getElementById('ws-form').style.display = 'none';
      document.getElementById('ws-add-btn').style.display = 'block';
      _wsEditIndex = -1;
    }

    function doSaveWorkspace() {
      var name  = (document.getElementById('ws-name').value  || '').trim();
      var host  = (document.getElementById('ws-host').value  || '').trim();
      var token = (document.getElementById('ws-token').value || '').trim();
      var done  = function() { _hideWsForm(); _reloadAfterWorkspaceChange(); };
      var fail  = function(e) { showToast('⚠ ' + e.message); };
      if (_wsEditIndex < 0) {
        if (!name || !host || !token) { showToast(t('wsNeedFields')); return; }
        google.script.run.withSuccessHandler(done).withFailureHandler(fail).addWorkspace(name, host, token);
      } else {
        google.script.run.withSuccessHandler(done).withFailureHandler(fail).updateWorkspace(_wsEditIndex, name, host, token);
      }
    }

    function doSwitchWorkspace(i) {
      if (i === _wsData.active) return;
      google.script.run
        .withSuccessHandler(function(cfg) {
          _config = cfg; _clustersLoaded = false;
          showToast('✓ ' + (cfg.workspace_name || ''));
          _loadDashboard();
          _loadSettingsTab();
        })
        .withFailureHandler(function(e) { showToast('⚠ ' + e.message); })
        .switchWorkspace(i);
    }

    function doDeleteWorkspace(i) {
      if (!confirm(t('confirmDeleteWs'))) return;
      google.script.run
        .withSuccessHandler(function() { _reloadAfterWorkspaceChange(); })
        .withFailureHandler(function(e) { showToast('⚠ ' + e.message); })
        .deleteWorkspace(i);
    }

    function _reloadAfterWorkspaceChange() {
      _clustersLoaded = false;
      google.script.run
        .withSuccessHandler(function(cfg) {
          _config = cfg;
          _loadWorkspaces();
          if (_config.host && _config.token) { _loadDashboard(); _loadSettingsTab(); }
          else { document.getElementById('loading-msg').style.display = 'none'; showSetupModal(); }
        })
        .withFailureHandler(function() {})
        .getConfig();
    }

    function doLogout() {
      if (!confirm(t('confirmLogout'))) return;
      google.script.run
        .withSuccessHandler(function() {
          _config = {}; _wsData = { active: 0, workspaces: [] };
          _dash = null; _widgetData = null; _clustersLoaded = false;
          _stopAutoRefresh();
          document.getElementById('detail-view').style.display = 'none';
          document.getElementById('setup-host').value  = '';
          document.getElementById('setup-token').value = '';
          showSetupModal();
        })
        .withFailureHandler(function(e) { showToast('⚠ ' + e.message); })
        .resetConfig();
    }

    function saveEndpointSetting() {
      var ep = document.getElementById('settings-endpoint').value;
      if (!ep) { showToast(t('noEndpointSelected')); return; }
      google.script.run
        .withSuccessHandler(function(config) { _config = config; showToast(t('endpointSaved')); })
        .withFailureHandler(function(e) { showToast('⚠ ' + e.message); })
        .saveConfig({ llm_endpoint: ep });
    }

    // ── Utils ─────────────────────────────────────────────────────────────────
    function formatDuration(ms) {
      var s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
      if (h > 0) return h + 'h ' + (m % 60) + 'm';
      if (m > 0) return m + 'm ' + (s % 60) + 's';
      return s + 's';
    }

    var _TZ = 'America/Argentina/Buenos_Aires';
    function _arFmt(ts, opts) {
      return new Intl.DateTimeFormat('es-AR', Object.assign({ timeZone: _TZ }, opts)).format(new Date(ts));
    }
    function formatTime(ts) {
      if (!ts) return '—';
      var tm   = _arFmt(ts,        { hour: '2-digit', minute: '2-digit', hour12: false });
      var day  = _arFmt(ts,        { year: 'numeric', month: '2-digit', day: '2-digit' });
      var tod  = _arFmt(Date.now(),{ year: 'numeric', month: '2-digit', day: '2-digit' });
      var yest = _arFmt(Date.now() - 86400000, { year: 'numeric', month: '2-digit', day: '2-digit' });
      if (day === tod)  return t('today')     + ' ' + tm;
      if (day === yest) return t('yesterday') + ' ' + tm;
      return _arFmt(ts, { day: 'numeric', month: 'numeric' }) + ' ' + tm;
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(function() { t.style.display = 'none'; }, 4000);
    }
  </script>
</body>
</html>
