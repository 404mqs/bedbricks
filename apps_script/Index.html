  <meta name="theme-color" content="#FF3621">
  <link rel="manifest" href="?page=manifest">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #1C2128; --surf:  #22272E; --surf2:  #2D333B;
      --bord:   #444C56; --bordl: #30363D;
      --text:   #CDD9E5; --muted: #768390; --dim:    #545D68;
      --orange: #FF3621; --blue:  #4184E4; --green:  #57AB5A;
      --red:    #E5534B; --amber: #C69026;
      --mono: 'SFMono-Regular','Consolas',monospace;
      --logo-filter: invert(1) hue-rotate(185deg);
    }
    html.light {
      --bg:    #F6F8FA; --surf:  #FFFFFF; --surf2: #F0F2F5;
      --bord:  #D0D7DE; --bordl: #E1E4E8;
      --text:  #1C2128; --muted: #6E7781; --dim:   #8C959F;
      --logo-filter: none;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system,'Segoe UI',system-ui,sans-serif; min-height: 100vh; font-size: 14px; transition: background .2s, color .2s; }

    /* Header */
    .header { height: auto; padding: 14px 12px; display: flex; align-items: center; justify-content: space-between; background: var(--surf); border-bottom: 1px solid var(--bordl); transition: background .2s; }
    .header-logo { height: 40px; width: auto; filter: var(--logo-filter); pointer-events: none; }
    .header-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; }
    .header-btns { display: flex; align-items: center; gap: 4px; }
    .btn-refresh { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 5px; border-radius: 4px; line-height: 1; transition: color .15s, background .15s; }
    .btn-refresh:hover { color: var(--text); background: var(--surf2); }
    .btn-refresh.spinning { animation: spin .6s linear infinite; color: var(--blue); }
    .btn-theme { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 5px; border-radius: 4px; line-height: 1; transition: color .15s, background .15s; }
    .btn-theme:hover { color: var(--text); background: var(--surf2); }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Tabs */
    .tab-nav { display: flex; background: var(--surf); border-bottom: 1px solid var(--bordl); }
    .tab-btn { flex: 1; padding: 10px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: .8rem; font-weight: 500; cursor: pointer; transition: color .15s; }
    .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* Search */
    .search-bar { padding: 10px 14px; }
    .search-input { width: 100%; background: var(--surf); border: 1px solid var(--bord); border-radius: 6px; padding: 7px 11px; color: var(--text); font-size: .8rem; outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: var(--blue); }
    .search-input::placeholder { color: var(--dim); }

    /* Job rows */
    .job-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--bordl); cursor: pointer; transition: background .1s; }
    .job-row:hover { background: var(--surf); }
    .job-info { flex: 1; min-width: 0; }
    .job-name { font-size: .8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-schedule { font-size: .67rem; color: var(--dim); margin-top: 2px; }
    .job-dots { display: flex; gap: 3px; flex-shrink: 0; }
    .dot { width: 8px; height: 8px; border-radius: 2px; }
    .dot-success { background: var(--green); }
    .dot-failed  { background: var(--red); }
    .dot-running { background: var(--blue); }
    .dot-empty   { background: var(--surf2); border: 1px solid var(--bord); }
    .btn-play { background: none; border: 1px solid var(--bord); border-radius: 4px; color: var(--muted); padding: 3px 8px; font-size: .7rem; cursor: pointer; flex-shrink: 0; transition: border-color .15s, color .15s; }
    .btn-play:hover { border-color: var(--orange); color: var(--orange); }

    /* Run rows */
    .run-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--bordl); cursor: pointer; transition: background .1s; }
    .run-row:hover { background: var(--surf); }
    .run-time { font-size: .67rem; color: var(--muted); white-space: nowrap; width: 62px; flex-shrink: 0; padding-top: 2px; }
    .run-info { flex: 1; min-width: 0; }
    .run-name { font-size: .8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-dur  { font-size: .67rem; color: var(--dim); margin-top: 2px; }

    /* Badges */
    .badge { padding: 2px 8px; border-radius: 4px; font-size: .67rem; font-weight: 600; letter-spacing: .02em; white-space: nowrap; }
    .badge-success { background: rgba(87,171,90,.15);  color: var(--green);  border: 1px solid rgba(87,171,90,.3); }
    .badge-failed  { background: rgba(229,83,75,.15);  color: var(--red);    border: 1px solid rgba(229,83,75,.3); }
    .badge-running { background: rgba(65,132,228,.15); color: var(--blue);   border: 1px solid rgba(65,132,228,.3); }
    .badge-loading { background: var(--surf2); color: var(--muted); border: 1px solid var(--bord); }

    /* Detail header */
    .detail-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surf); border-bottom: 1px solid var(--bordl); }
    .btn-back { background: none; border: none; color: var(--blue); font-size: .8rem; cursor: pointer; padding: 4px 0; white-space: nowrap; }
    .detail-job-name { font-size: .8rem; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-trigger { background: var(--orange); border: none; border-radius: 4px; color: #fff; padding: 5px 10px; font-size: .7rem; font-weight: 600; cursor: pointer; flex-shrink: 0; transition: opacity .15s; }
    .btn-trigger:hover { opacity: .85; }

    /* Detail body */
    .detail-body { padding: 0 14px 24px; }
    .card { background: var(--surf); border: 1px solid var(--bordl); border-radius: 6px; padding: 14px; margin-top: 10px; }
    .card.expandable { cursor: pointer; user-select: none; }
    .status-row { display: flex; align-items: center; gap: 10px; }
    .status-label { font-size: .88rem; font-weight: 600; }
    .run-id { font-size: .67rem; color: var(--dim); margin-top: 5px; font-family: var(--mono); }
    .detail-arrow { margin-left: auto; color: var(--muted); font-size: 1rem; display: inline-block; transition: transform .2s; }
    .detail-card { background: var(--surf2); border-radius: 6px; padding: 10px 14px; margin-top: 8px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: .8rem; }
    .detail-row:not(:last-child) { border-bottom: 1px solid var(--bordl); }
    .detail-label { color: var(--muted); }
    .detail-section-title { font-size: .63rem; font-weight: 700; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }

    /* Task rows */
    .task-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
    .task-row:not(:last-child) { border-bottom: 1px solid var(--bordl); }
    .task-icon { width: 14px; text-align: center; font-size: .8rem; flex-shrink: 0; }
    .task-name { flex: 1; font-size: .73rem; font-family: var(--mono); color: var(--text); word-break: break-all; }
    .task-dur  { font-size: .67rem; color: var(--muted); flex-shrink: 0; }
    .task-ok   .task-icon { color: var(--green); }
    .task-fail .task-icon { color: var(--red); }
    .task-other .task-icon { color: var(--dim); }

    /* Task code chips */
    .task-chip { font-size:.6rem; padding:2px 7px; border-radius:10px; cursor:pointer; background:var(--surf2); border:1px solid var(--bord); color:var(--text); flex-shrink:0; margin-left:4px; white-space:nowrap; user-select:none; }
    .task-chip-open { background:var(--accent,#FF3621); color:#fff; border-color:var(--accent,#FF3621); }

    /* Notebook/subjob panels (inserted after task row in DOM) */
    .task-code-panel { background:var(--surf2); border-radius:6px; padding:10px; margin:0 0 6px 0; }
    .code-panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:4px; }
    .code-panel-path { color:var(--accent,#FF3621); font-size:11px; font-family:var(--mono); word-break:break-all; }
    .code-panel-meta { font-size:10px; color:var(--muted); flex-shrink:0; }
    .code-panel-loading { background:#0d1117; border-radius:4px; padding:8px; min-height:40px; display:flex; align-items:center; justify-content:center; }
    .code-panel-loading-text { color:var(--muted); font-size:11px; }
    .code-panel-error { color:var(--red,#f87171); font-size:11px; text-align:center; background:#0d1117; border-radius:4px; padding:10px; }
    .code-panel-code-wrap { background:#0d1117; border-radius:4px; padding:8px; font-family:var(--mono); font-size:10px; color:#e6edf3; line-height:1.6; position:relative; max-height:80px; overflow:hidden; }
    .code-panel-code-wrap.full { max-height:40vh; overflow-y:auto; }
    .code-panel-code { white-space:pre-wrap; word-break:break-all; }
    .code-fade { position:absolute; bottom:0; left:0; right:0; height:25px; background:linear-gradient(transparent,#0d1117); pointer-events:none; }
    .code-expand-btn { width:100%; margin-top:6px; padding:5px; background:none; border:1px solid var(--bord); border-radius:4px; color:var(--muted); font-size:10px; cursor:pointer; }
    .hl-comment { color:#8b949e; }
    .hl-kw { color:#79c0ff; }
    .subjob-panel-lbl { font-size:11px; color:var(--muted); margin-bottom:4px; }
    .subjob-panel-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .subjob-panel-id { font-size:10px; color:var(--muted); }
    .subjob-nav-btn { width:100%; padding:7px; background:var(--accent,#FF3621); border:none; border-radius:4px; color:#fff; font-size:11px; font-weight:700; cursor:pointer; }

    /* Diagnosis card */
    .card-diagnosis { background: rgba(255,54,33,.06); border: 1px solid rgba(255,54,33,.22); border-radius: 6px; padding: 14px; margin-top: 10px; }
    .card-diagnosis .label { font-size: .63rem; font-weight: 700; letter-spacing: .1em; color: var(--orange); text-transform: uppercase; margin-bottom: 8px; }
    .diagnosis-text { font-size: .83rem; line-height: 1.7; color: var(--text); }
    .diagnosis-text strong { color: var(--text); font-weight: 700; }

    /* Think fix button */
    .btn-think-fix { display: block; width: 100%; margin-top: 8px; padding: 11px; background: var(--surf2); border: 1px solid var(--bord); color: var(--text); font-size: .82rem; font-weight: 600; border-radius: 6px; cursor: pointer; transition: border-color .15s, background .15s; }
    .btn-think-fix:hover { border-color: var(--blue); background: rgba(65,132,228,.08); }
    .btn-think-fix:disabled { opacity: .4; cursor: not-allowed; }

    /* Fix card */
    .card-fix { background: rgba(65,132,228,.05); border: 1px solid rgba(65,132,228,.22); border-radius: 6px; padding: 14px; margin-top: 10px; }
    .card-fix .fix-label { font-size: .63rem; font-weight: 700; color: var(--blue); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
    .fix-analysis { font-size: .8rem; color: var(--text); line-height: 1.7; }
    .fix-analysis strong { color: #E6EDF3; }
    .fix-section-title { font-size: .61rem; font-weight: 700; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; margin: 10px 0 4px; }
    .fix-code { background: #161B22; border: 1px solid var(--bordl); border-radius: 4px; padding: 10px; font-family: var(--mono); font-size: .69rem; color: var(--red); overflow-x: auto; max-height: 180px; overflow-y: auto; white-space: pre; margin: 0; }
    .fix-code-new { color: var(--green); }

    /* Apply fix button */
    .btn-apply-fix { display: block; width: 100%; margin-top: 10px; padding: 11px; background: var(--green); border: none; color: #fff; font-size: .82rem; font-weight: 600; border-radius: 6px; cursor: pointer; transition: opacity .15s; }
    .btn-apply-fix:hover { opacity: .85; }
    .btn-apply-fix:disabled { opacity: .4; cursor: not-allowed; }

    /* Log */
    details { margin-top: 10px; }
    summary { cursor: pointer; font-size: .73rem; color: var(--muted); padding: 6px 10px; background: var(--surf2); border: 1px solid var(--bordl); border-radius: 4px; list-style: none; user-select: none; }
    summary::before { content: '▶  '; font-size: .63rem; }
    details[open] summary::before { content: '▼  '; }
    .log-raw { background: #161B22; border: 1px solid var(--bordl); border-top: none; border-radius: 0 0 4px 4px; padding: 10px; font-family: var(--mono); font-size: .67rem; color: var(--muted); overflow-x: auto; max-height: 220px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }

    /* Repair */
    .btn-repair { display: block; width: 100%; margin-top: 12px; padding: 13px; background: var(--red); color: #fff; font-size: .9rem; font-weight: 700; letter-spacing: .04em; border: none; border-radius: 6px; cursor: pointer; transition: opacity .15s; }
    .btn-repair:hover { opacity: .85; }
    .btn-repair:disabled { opacity: .4; cursor: not-allowed; }
    .btn-repair.code-error { background: var(--amber); }

    /* Warning */
    .warning-banner { display: flex; align-items: flex-start; gap: 8px; background: rgba(198,144,38,.1); border: 1px solid rgba(198,144,38,.3); border-radius: 6px; padding: 10px 12px; margin-top: 10px; font-size: .76rem; color: var(--amber); line-height: 1.5; }
    .warning-banner-icon { flex-shrink: 0; line-height: 1.5; }

    /* Toast */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surf2); color: var(--text); padding: 10px 16px; border-radius: 6px; font-size: .8rem; border: 1px solid var(--bord); box-shadow: 0 4px 20px rgba(0,0,0,.5); display: none; z-index: 100; max-width: 90vw; text-align: center; }

    #loading-msg { color: var(--muted); font-size: .85rem; text-align: center; padding: 48px 16px; }
    .empty-msg { padding: 32px 16px; text-align: center; color: var(--dim); font-size: .8rem; }

    /* Orchestrator widget */
    .orch-widget { background: var(--surf); border-bottom: 2px solid var(--orange); padding: 12px 14px; cursor: pointer; transition: background .1s; }
    .orch-widget:hover { background: var(--surf2); }
    .orch-label { font-size: .58rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
    .orch-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .orch-name { font-size: .8rem; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .orch-prog-track { height: 4px; background: var(--surf2); border-radius: 2px; overflow: hidden; }
    .orch-prog-fill { height: 100%; border-radius: 2px; transition: width .3s; }
    .orch-prog-meta { display: flex; justify-content: space-between; margin-top: 4px; font-size: .62rem; color: var(--muted); }
    .orch-elapsed { font-size: .62rem; color: var(--dim); margin-top: 5px; }

    /* Filter chips */
    .filter-bar { padding: 6px 14px 8px; display: flex; gap: 6px; justify-content: center; }
    .filter-chip { background: none; border: 1px solid var(--bord); border-radius: 12px; color: var(--muted); font-size: .7rem; padding: 3px 10px; cursor: pointer; transition: all .15s; }
    .filter-chip.active { border-color: var(--orange); color: var(--orange); background: rgba(255,54,33,.08); }

    /* Favorites */
    .section-label { font-size: .6rem; font-weight: 700; color: var(--dim); letter-spacing: .1em; text-transform: uppercase; padding: 8px 14px 4px; }
    .btn-fav { background: none; border: none; color: var(--muted); font-size: .9rem; cursor: pointer; padding: 3px 4px; flex-shrink: 0; transition: color .15s; }
    .btn-fav:hover { color: var(--amber); }
    .btn-fav.is-fav { color: var(--amber); }
    .btn-pin { background: none; border: none; color: var(--dim); font-size: .85rem; cursor: pointer; padding: 3px 4px; flex-shrink: 0; transition: color .15s; }
    .btn-pin:hover { color: var(--text); }
    .btn-pin.is-pinned { color: var(--orange); }

    /* Cancel button */
    .btn-cancel { background: none; border: 1px solid var(--red); border-radius: 4px; color: var(--red); padding: 5px 8px; font-size: .7rem; font-weight: 600; cursor: pointer; flex-shrink: 0; transition: opacity .15s; }
    .btn-cancel:hover { opacity: .85; }
    .btn-cancel:disabled { opacity: .4; cursor: not-allowed; }

    /* Fix history */
    .fix-entry { padding: 10px 14px; border-bottom: 1px solid var(--bordl); }
    .fix-entry-path { font-size: .73rem; font-family: var(--mono); color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .fix-entry-time { font-size: .63rem; color: var(--dim); margin-bottom: 4px; }
    .fix-entry-preview { font-size: .67rem; font-family: var(--mono); }
    .fix-from { color: var(--red); }
    .fix-to   { color: var(--green); }

    /* Job name marquee — long names scroll horizontally */
    .job-name.marquee         { text-overflow: clip; }
    .job-name.marquee > span  { display: inline-block; animation: name-scroll 8s ease-in-out infinite; }
    @keyframes name-scroll {
      0%,  25% { transform: translateX(0); }
      60%, 85% { transform: translateX(-160px); }
      100%     { transform: translateX(0); }
    }

    /* Diff view */
    .fix-diff { color: var(--muted); }
    .diff-del { display: block; color: var(--red);   background: rgba(229,83,75,.08); }
    .diff-add { display: block; color: var(--green); background: rgba(87,171,90,.08); }
    .diff-ctx { display: block; color: var(--muted); }

    /* Cluster rows */
    .cluster-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--bordl); }
    .cluster-info { flex: 1; min-width: 0; }
    .cluster-name { font-size: .8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cluster-meta { font-size: .67rem; color: var(--dim); margin-top: 2px; }
    .btn-cluster-action { background: none; border: 1px solid var(--bord); border-radius: 4px; color: var(--muted); padding: 4px 9px; font-size: .7rem; font-weight: 600; cursor: pointer; flex-shrink: 0; transition: all .15s; }
    .btn-cluster-action.start:hover  { border-color: var(--orange); color: var(--orange); }
    .btn-cluster-action.stop:hover   { border-color: var(--red);    color: var(--red); }

    /* Schedule modal */
    #schedule-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:150; align-items:center; justify-content:center; padding:24px; }
    .schedule-card { background:var(--surf); border:1px solid var(--bord); border-radius:10px; padding:20px; width:100%; max-width:320px; }
    .schedule-title { font-size:.9rem; font-weight:700; margin-bottom:16px; }
    .time-input { width:100%; background:var(--surf2); border:1px solid var(--bord); border-radius:6px; padding:8px 11px; color:var(--text); font-size:.9rem; outline:none; }
    .btn-schedule { background:none; border:1px solid var(--bord); border-radius:4px; color:var(--muted); padding:3px 6px; font-size:.7rem; cursor:pointer; flex-shrink:0; transition:all .15s; }
    .btn-schedule:hover { border-color:var(--blue); color:var(--blue); }

    /* Perf chart */
    .perf-chart-wrap { overflow-x: auto; }

    /* Spinner universal de carga */
    .spin { display:inline-block; width:14px; height:14px; border:2px solid var(--bord); border-top-color:var(--blue); border-radius:50%; animation:bb-spin .7s linear infinite; vertical-align:middle; box-sizing:border-box; }
    .spin-lg { width:22px; height:22px; border-width:3px; }
    @keyframes bb-spin { to { transform:rotate(360deg); } }
    .load-center { display:flex; justify-content:center; align-items:center; padding:40px 0; }
  </style>
</head>
<body>
  <div class="header" style="position:relative">
    <div class="header-btns">
      <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Cambiar tema"></button>
      <button class="btn-theme" id="btn-search" onclick="openSearch()" title="Search" style="line-height:0"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M13.5 13.5l-3-3"/></svg></button>
    </div>
    <div class="header-center">
      <img class="header-logo" id="header-logo" src="" alt="Bedbricks">
    </div>
    <div class="header-btns">
      <button class="btn-refresh" id="btn-refresh" onclick="refreshDashboard()" title="Refresh">↻ <span id="refresh-badge" style="display:none;font-size:.65rem;color:var(--blue);font-weight:600"></span></button>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="tab-btn-jobs"     onclick="switchTab('jobs')">Jobs</button>
    <button class="tab-btn"        id="tab-btn-runs"     onclick="switchTab('runs')">Runs</button>
    <button class="tab-btn"        id="tab-btn-fixes"    onclick="switchTab('fixes')">Fixes</button>
    <button class="tab-btn"        id="tab-btn-settings" onclick="switchTab('settings')" style="line-height:0"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.5"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.41 1.41M11.19 11.19l1.41 1.41M3.4 12.6l1.41-1.41M11.19 4.81l1.41-1.41"/></svg></button>
    <button class="tab-btn" id="tab-btn-clusters" onclick="switchTab('clusters')" style="line-height:0"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="2" width="14" height="10" rx="1.5"/><path d="M5 15h6M8 12v3"/></svg></button>
  </div>

  <div id="loading-msg" class="load-center"><span class="spin spin-lg"></span></div>

  <div id="tab-jobs" style="display:none">
    <div id="orch-widget"></div>
    <div class="search-bar">
      <input class="search-input" id="job-search" type="text" placeholder="Search jobs..." data-i18n-ph="searchPlaceholder" oninput="_applyFilters()">
    </div>
    <div class="filter-bar">
      <button class="filter-chip active" id="filter-todos"   onclick="setFilter('todos')"   data-i18n="all">All</button>
      <button class="filter-chip"        id="filter-failed"  onclick="setFilter('failed')"  data-i18n="failed">Failed</button>
      <button class="filter-chip"        id="filter-running" onclick="setFilter('running')" data-i18n="running">Running</button>
    </div>
    <div id="jobs-list"></div>
  </div>

  <div id="tab-runs" style="display:none">
    <div id="runs-list"></div>
  </div>

  <div id="tab-fixes" style="display:none">
    <div id="fixes-list"></div>
  </div>

  <div id="tab-settings" style="display:none">
    <div style="padding:14px 14px 24px">

      <!-- Workspaces -->
      <div style="font-size:.63rem;font-weight:700;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px" data-i18n="workspaces">Workspaces</div>
      <div class="card">
        <div id="settings-workspaces-list"></div>
        <button id="ws-add-btn" onclick="_showWsForm(-1)" style="display:block;width:100%;margin-top:8px;padding:9px;background:var(--surf2);border:1px dashed var(--bord);border-radius:6px;color:var(--muted);font-size:.78rem;cursor:pointer" data-i18n="addWorkspace">+ Add workspace</button>
        <div id="ws-form" style="display:none;margin-top:10px;border-top:1px solid var(--bordl);padding-top:10px">
          <input id="ws-name"  type="text"     class="search-input" placeholder="Name"  data-i18n-ph="wsName"   style="margin-bottom:8px;font-size:16px">
          <input id="ws-host"  type="url"      class="search-input" placeholder="https://adb-xxxx.azuredatabricks.net" style="margin-bottom:8px;font-size:16px">
          <input id="ws-token" type="password" class="search-input" placeholder="dapi..." data-i18n-ph="personalAccessToken" style="margin-bottom:10px;font-size:16px">
          <div style="display:flex;gap:8px">
            <button onclick="_hideWsForm()" style="flex:0 0 auto;padding:9px 14px;background:none;border:1px solid var(--bord);border-radius:6px;color:var(--muted);font-size:.85rem;cursor:pointer" data-i18n="back" title="Back">‹</button>
            <button onclick="doSaveWorkspace()" style="flex:1;padding:9px;background:var(--orange);border:none;border-radius:6px;color:#fff;font-size:.8rem;font-weight:700;cursor:pointer" data-i18n="saveWorkspace">Save</button>
          </div>
        </div>
      </div>

      <!-- LLM Endpoint -->
      <div style="font-size:.63rem;font-weight:700;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px" data-i18n="llmEndpoint">LLM Endpoint</div>
      <div class="card">
        <label style="font-size:.75rem;color:var(--muted);display:block;margin-bottom:6px" data-i18n="llmEndpointDesc">Serving endpoint for AI diagnosis</label>
        <select id="settings-endpoint" style="width:100%;background:var(--surf2);border:1px solid var(--bord);border-radius:6px;padding:7px 11px;color:var(--text);font-size:.8rem;outline:none">
          <option value="">…</option>
        </select>

    function t(key) { return (STRINGS[_lang] || STRINGS.en)[key] || STRINGS.en[key] || key; }

    function setLang(lang) {
      _lang = lang;
      // Update data-i18n elements
      var els = document.querySelectorAll('[data-i18n]');
      for (var i = 0; i < els.length; i++) {
        els[i].textContent = t(els[i].getAttribute('data-i18n'));
      }
      var pEls = document.querySelectorAll('[data-i18n-ph]');
      for (var j = 0; j < pEls.length; j++) {
        pEls[j].placeholder = t(pEls[j].getAttribute('data-i18n-ph'));
      }
      var tEls = document.querySelectorAll('[data-i18n-title]');
      for (var k = 0; k < tEls.length; k++) {
        tEls[k].title = t(tEls[k].getAttribute('data-i18n-title'));
      }
      // Update active lang buttons
      var enBtn = document.getElementById('lang-btn-en');
      var esBtn = document.getElementById('lang-btn-es');
      if (enBtn) enBtn.style.borderColor = lang === 'en' ? 'var(--orange)' : 'var(--bord)';
      if (enBtn) enBtn.style.color       = lang === 'en' ? 'var(--orange)' : 'var(--text)';
      if (esBtn) esBtn.style.borderColor = lang === 'es' ? 'var(--orange)' : 'var(--bord)';
      if (esBtn) esBtn.style.color       = lang === 'es' ? 'var(--orange)' : 'var(--text)';
      // Persist
      google.script.run
        .withSuccessHandler(function(cfg) { _config = cfg; })
        .withFailureHandler(function() {})
        .saveConfig({ lang: lang });
    }

    var _SUN  = '<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3" fill="currentColor" stroke="none"/><line x1="8" y1="0.5" x2="8" y2="2.3"/><line x1="8" y1="13.7" x2="8" y2="15.5"/><line x1="0.5" y1="8" x2="2.3" y2="8"/><line x1="13.7" y1="8" x2="15.5" y2="8"/><line x1="2.8" y1="2.8" x2="4.1" y2="4.1"/><line x1="11.9" y1="11.9" x2="13.2" y2="13.2"/><line x1="13.2" y1="2.8" x2="11.9" y2="4.1"/><line x1="4.1" y1="11.9" x2="2.8" y2="13.2"/></svg>';
    function _setThemeIcon(isLight) {
      document.getElementById('btn-theme').innerHTML = isLight ? _SUN : _MOON;
    }
    function toggleTheme() {
      var isLight = document.documentElement.classList.toggle('light');
      _setThemeIcon(isLight);
      try { localStorage.setItem('bedbricks-theme', isLight ? 'light' : 'dark'); } catch(e) {}
    }
    (function() {
      var saved = ''; try { saved = localStorage.getItem('bedbricks-theme'); } catch(e) {}
      if (saved === 'dark') { _setThemeIcon(false); }
      else { document.documentElement.classList.add('light'); _setThemeIcon(true); }
    })();

    function renderWidget(data) {
      var el = document.getElementById('orch-widget');
      if (!el) return;
      if (!data || data.status === 'NO_RUNS') { el.innerHTML = ''; return; }
      if (!data || data.status === 'NO_PINNED_JOB') {
        el.innerHTML = '<div style="padding:14px;color:var(--dim);font-size:.75rem;text-align:center">' + t('noPinnedWidget') + '</div>';
        return;
      }
      var bc = 'badge-loading', bt = data.status;
      if (data.status === 'SUCCESS') { bc = 'badge-success'; bt = 'SUCCESS'; }
      if (data.status === 'FAILED')  { bc = 'badge-failed';  bt = 'FAILED'; }
      if (['RUNNING','PENDING','QUEUED','TERMINATING'].indexOf(data.status) !== -1) { bc = 'badge-running'; bt = t('runningBadge'); }
      var pct = data.tasks_total > 0 ? Math.round(data.tasks_done / data.tasks_total * 100) : 0;
      var progColor = data.status === 'FAILED' ? 'var(--red)' : (data.status === 'SUCCESS' ? 'var(--green)' : 'var(--blue)');
      var elapsed = '';
      if (data.start_time) {
        var ms = data.end_time ? (data.end_time - data.start_time) : (Date.now() - data.start_time);
        elapsed = formatDuration(ms);
      }
      var orchName = 'Orquestador Mark II';
      if (_dash && _dash.jobs) {
        for (var i = 0; i < _dash.jobs.length; i++) {
          if (_dash.jobs[i].job_id == _config.pinned_job_id) { orchName = _dash.jobs[i].name; break; }
        }
      }
      el.innerHTML = '<div class="orch-widget" onclick="showDetail(' + (parseInt(_config.pinned_job_id, 10) || 0) + ',' + escHtml(JSON.stringify(orchName)) + ')">' +
        '<div class="orch-label">' + t('pinnedJobLabel') + '</div>' +
        '<div class="orch-row"><span class="orch-name">' + escHtml(orchName) + '</span>' +
          '<span class="badge ' + bc + '">' + bt + '</span></div>' +
        (data.tasks_total > 0
          ? '<div class="orch-prog-track"><div class="orch-prog-fill" style="width:' + pct + '%;background:' + progColor + '"></div></div>' +
            '<div class="orch-prog-meta"><span>' + data.tasks_done + ' / ' + data.tasks_total + ' ' + t('tasksOk') + '</span><span>' + pct + '%</span></div>'
          : '') +
        (elapsed ? '<div class="orch-elapsed">⏱ ' + escHtml(elapsed) + (data.status === 'FAILED' ? ' ' + t('jobFailed') : data.status === 'SUCCESS' ? ' ' + t('jobOk') : '') + '</div>' : '') +
      '</div>';
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    function _loadDashboard() {
      var btn = document.getElementById('btn-refresh');
      if (btn) btn.classList.add('spinning');
      google.script.run
        .withSuccessHandler(function(data) {
          _dash = data;
          document.getElementById('loading-msg').style.display = 'none';
          document.getElementById('tab-jobs').style.display     = _currentTab === 'jobs'     ? 'block' : 'none';
          document.getElementById('tab-runs').style.display     = _currentTab === 'runs'     ? 'block' : 'none';
          document.getElementById('tab-fixes').style.display    = _currentTab === 'fixes'    ? 'block' : 'none';
          document.getElementById('tab-settings').style.display = _currentTab === 'settings' ? 'block' : 'none';
          renderJobs(data.jobs);
          renderRuns(data.runs);
          _loadWidget();
          _loadFavorites();
          if (btn) btn.classList.remove('spinning');
        })
        .withFailureHandler(function(err) {
          document.getElementById('loading-msg').textContent = '⚠ ' + err.message;
          if (btn) btn.classList.remove('spinning');
        })
        .getDashboard();
    }

    function _loadWidget() {
      if (!_config.pinned_job_id) {
        document.getElementById('orch-widget').innerHTML =
          '<div style="padding:14px;color:var(--dim);font-size:.75rem;text-align:center">' +
          t('noPinnedWidget') + '</div>';
        return;
      }
      google.script.run
        .withSuccessHandler(function(data) { _widgetData = data; renderWidget(data); _checkAutoRefresh(); })
        .withFailureHandler(function() { document.getElementById('orch-widget').innerHTML = ''; })
        .getOrchestratorStatus();
    }

    function refreshDashboard() {
      _stopAutoRefresh();
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('tab-jobs').style.display     = _currentTab === 'jobs'     ? 'block' : 'none';
      document.getElementById('tab-runs').style.display     = _currentTab === 'runs'     ? 'block' : 'none';
      document.getElementById('tab-fixes').style.display    = _currentTab === 'fixes'    ? 'block' : 'none';
      document.getElementById('tab-settings').style.display = _currentTab === 'settings' ? 'block' : 'none';
      _loadDashboard();
    }

    function showSetupModal() {
      var m = document.getElementById('setup-modal');
      m.style.display = 'flex';
      document.getElementById('setup-logo').src = document.getElementById('header-logo').src;
    }

    function saveSetup() {
      var host  = (document.getElementById('setup-host').value  || '').trim();
      var token = (document.getElementById('setup-token').value || '').trim();
      if (!host || !token) { showToast(t('hostTokenRequired')); return; }
      var btn = document.querySelector('#setup-modal button');
      if (btn) btn.disabled = true;
      google.script.run
        .withSuccessHandler(function(config) {
          _config = config;
          document.getElementById('setup-modal').style.display = 'none';
          refreshDashboard();
        })
        .withFailureHandler(function(e) {
          if (btn) btn.disabled = false;
          showToast('Error saving config: ' + e.message);
        })
        .saveConfig({ host: host, token: token });
    }

    function initApp() {
      google.script.run
        .withSuccessHandler(function(config) {
          _config = config;
          // Siempre normalizar la UI al idioma actual (aplica íconos/data-i18n aunque sea 'en')
          setLang(config.lang || _lang);
          if (!config.host || !config.token) {
            document.getElementById('loading-msg').style.display = 'none';
            showSetupModal();
          } else {
            _loadDashboard();
          }
        })
        .withFailureHandler(function() {
          document.getElementById('loading-msg').style.display = 'none';
          showSetupModal();
        })
        .getConfig();
    }

    initApp();

      new GestureManager({
        onPullRefresh: function() { refreshDashboard(); },
        onSwipeRow: function(row) { if (row) _showSwipeActions(row); }
      });

    // ── Tabs ──────────────────────────────────────────────────────────────────
    function switchTab(tab) {
      _currentTab = tab;
      // Cerrar el detalle si estaba abierto (es un overlay aparte de las tabs)
      document.getElementById('detail-view').style.display = 'none';
      ['jobs','runs','fixes','settings','clusters'].forEach(function(tabId) {
        document.getElementById('tab-' + tabId).style.display         = tabId === tab ? 'block' : 'none';
        document.getElementById('tab-btn-' + tabId).classList.toggle('active', tabId === tab);
      });
      if (tab === 'fixes'    && !_fixes.length) _loadFixes();
      if (tab === 'settings') _loadSettingsTab();
      if (tab === 'clusters') _loadClusters();
    }

    // ── Jobs ──────────────────────────────────────────────────────────────────
    function setFilter(f) {
      _activeFilter = f;
      ['todos','failed','running'].forEach(function(id) {
        document.getElementById('filter-' + id).className = 'filter-chip' + (id === f ? ' active' : '');
      });
      _applyFilters();
    }

    function _applyJobFilter(jobs) {
      var q = (document.getElementById('job-search') ? document.getElementById('job-search').value : '').toLowerCase();
      return (jobs || []).filter(function(j) {
        if (q && j.name.toLowerCase().indexOf(q) === -1) return false;
        if (_activeFilter === 'failed')  return j.runs.some(function(r) { return r.result_state === 'FAILED'; });
        if (_activeFilter === 'running') return j.runs.some(function(r) { return r.life_cycle_state === 'RUNNING'; });
        return true;
      });
    }

    function _applyFilters() {
      if (!_dash) return;
      renderJobs(_applyJobFilter(_dash.jobs));
    }

    function _loadFavorites() {
      google.script.run
        .withSuccessHandler(function(favs) { _favorites = (favs || []).map(String); _applyFilters(); })
        .withFailureHandler(function() {})
        .getFavorites();
    }

    function _isFavorite(jobId) {
      return _favorites.indexOf(String(jobId)) !== -1;
    }

    function doToggleFavorite(jobId) {
      google.script.run
        .withSuccessHandler(function(favs) { _favorites = (favs || []).map(String); _applyFilters(); })
        .withFailureHandler(function() {})
        .toggleFavorite(jobId);
    }

    function _isPinned(jobId) {
      return _config.pinned_job_id && String(_config.pinned_job_id) === String(jobId);
    }

    function doPinJob(jobId, jobName) {
      if (_isPinned(jobId)) {
        google.script.run
          .withSuccessHandler(function(config) { _config = config; _loadWidget(); _applyFilters(); if (_currentTab === 'settings') _loadSettingsTab(); })
          .withFailureHandler(function(e) { showToast('⚠ ' + e.message); })
          .clearPinnedJob();
      } else {
        google.script.run
          .withSuccessHandler(function(config) { _config = config; _loadWidget(); _applyFilters(); if (_currentTab === 'settings') _loadSettingsTab(); })
          .withFailureHandler(function(e) { showToast('⚠ ' + e.message); })
          .setPinnedJob(jobId, jobName);
      }
    }

    function renderJobs(jobs) {
      if (!jobs || !jobs.length) {
        document.getElementById('jobs-list').innerHTML = '<div class="empty-msg">' + t('noJobs') + '</div>';
        return;
      }
      var favJobs    = jobs.filter(function(j) { return _isFavorite(j.job_id); });
      var normalJobs = jobs.filter(function(j) { return !_isFavorite(j.job_id); });
      var html = '';
      if (favJobs.length) {
        html += '<div class="section-label">' + t('favorites') + '</div>';
        favJobs.forEach(function(j) { html += _buildJobRow(j); });
        if (normalJobs.length) html += '<div class="section-label">' + t('jobsSection') + '</div>';
      }
      normalJobs.forEach(function(j) { html += _buildJobRow(j); });
      document.getElementById('jobs-list').innerHTML = html;
    }

    function _buildJobRow(j) {
      var starClass = _isFavorite(j.job_id) ? 'btn-fav is-fav' : 'btn-fav';
      var starIcon  = _isFavorite(j.job_id) ? '★' : '☆';
      return '<div class="job-row" data-job-id="' + j.job_id + '" data-job-name="' + escHtml(j.name) + '" onclick="showDetail(' + j.job_id + ',' + escHtml(JSON.stringify(j.name)) + ')">' +
        '<div class="job-info">' +
          (j.name.length > 28
            ? '<div class="job-name marquee"><span>' + escHtml(j.name) + '</span></div>'
            : '<div class="job-name">' + escHtml(j.name) + '</div>') +
          '<div class="job-schedule">' + escHtml(j.schedule || '—') + '</div>' +
        '</div>' +
        '<div class="job-dots">' + buildDots(j.runs) + '</div>' +
        '<button class="' + starClass + '" onclick="event.stopPropagation();doToggleFavorite(' + j.job_id + ')">' + starIcon + '</button>' +
        '<button class="btn-pin' + (_isPinned(j.job_id) ? ' is-pinned' : '') + '" ' +
          'title="' + (_isPinned(j.job_id) ? t('unpinTitle') : t('pinTitle')) + '" ' +
          'onclick="event.stopPropagation();doPinJob(' + j.job_id + ',' + escHtml(JSON.stringify(j.name)) + ')">⊙</button>' +
        '<button class="btn-play" onclick="event.stopPropagation();confirmTrigger(' + j.job_id + ',' + escHtml(JSON.stringify(j.name)) + ')">&#9654;</button>' +
        '<button class="btn-schedule" onclick="event.stopPropagation();openScheduleModal(' + j.job_id + ',' + escHtml(JSON.stringify(j.name)) + ')" title="' + t('scheduleJob') + '" style="line-height:0"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="9" r="6"/><path d="M8 6v3.5l2 1.5M8 1v2M5 1.5l1 1.7"/></svg></button>' +
      '</div>';
    }

    function buildDots(runs) {
      var html = '';
      for (var i = 0; i < 5; i++) {
        var r = runs && runs[i];
        var cls = 'dot dot-empty';
        if (r) {
          if (r.life_cycle_state === 'RUNNING')  cls = 'dot dot-running';
          else if (r.result_state === 'SUCCESS') cls = 'dot dot-success';
          else if (r.result_state === 'FAILED')  cls = 'dot dot-failed';
        }
        html += '<span class="' + cls + '"></span>';
      }
      return html;
    }

    function filterJobs(q) { _applyFilters(); }

    // ── Runs ──────────────────────────────────────────────────────────────────
    function renderRuns(runs) {
      if (!runs || !runs.length) {
        document.getElementById('runs-list').innerHTML = '<div class="empty-msg">' + t('noRuns') + '</div>';
        return;
      }
      runs = runs.slice().sort(function(a, b) { return b.start_time - a.start_time; });
      var html = '';
      runs.forEach(function(r) {
        var lc = r.life_cycle_state, rs = r.result_state;
        var bc = 'badge-loading', bt = lc;
        if (lc === 'RUNNING')    { bc = 'badge-running'; bt = t('runningBadge'); }
        if (rs === 'SUCCESS')    { bc = 'badge-success'; bt = t('successBadge'); }
        if (rs === 'FAILED')     { bc = 'badge-failed';  bt = t('failedBadge'); }
        html += '<div class="run-row" onclick="showDetail(' + r.job_id + ',' + escHtml(JSON.stringify(r.job_name)) + ')">' +
          '<div class="run-time">' + escHtml(formatTime(r.start_time)) + '</div>' +
          '<div class="run-info">' +
            '<div class="run-name">' + escHtml(r.job_name) + '</div>' +
            (r.duration_ms ? '<div class="run-dur">' + formatDuration(r.duration_ms) + '</div>' : '') +
          '</div>' +
          '<span class="badge ' + bc + '">' + escHtml(bt) + '</span>' +
        '</div>';
      });
      document.getElementById('runs-list').innerHTML = html;
    }

    // ── Detail ────────────────────────────────────────────────────────────────
    function showDetail(jobId, jobName) {
      _currentJobId = jobId;
      _fixByPanel   = {};
      _currentRunId = null;
      document.getElementById('tab-jobs').style.display     = 'none';
      document.getElementById('tab-runs').style.display     = 'none';
      document.getElementById('tab-fixes').style.display    = 'none';
      document.getElementById('tab-settings').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      document.getElementById('detail-job-name').textContent = jobName;
      document.getElementById('detail-body').innerHTML = SPIN_LG;
      google.script.run
        .withSuccessHandler(renderDetail)
        .withFailureHandler(function(err) {
          document.getElementById('detail-body').innerHTML = '<div style="color:#f87171;padding:16px">⚠ ' + escHtml(err.message) + '</div>';
        })
        .getJobDetail(jobId, _lang);
    }

    function closeDetail() {
      document.getElementById('detail-view').style.display = 'none';
      switchTab(_currentTab);
    }

    function doCancelRun() {
      if (!_currentRunId) return;
      if (!confirm((_lang === 'es' ? 'Cancelar run #' : 'Cancel run #') + _currentRunId + '?')) return;
      var btn = document.getElementById('btn-cancel-run');
      btn.disabled = true; btn.innerHTML = SPIN;
      google.script.run
        .withSuccessHandler(function() {
          showToast(t('runCancelled'));
          btn.style.display = 'none'; btn.disabled = false; btn.textContent = t('cancel');
          setTimeout(function() { showDetail(_currentJobId, document.getElementById('detail-job-name').textContent); }, 1500);
        })
        .withFailureHandler(function(e) {
          showToast('⚠ ' + e.message);
          btn.disabled = false; btn.textContent = t('cancel');
        })
        .cancelRun(_currentRunId);
    }

    function renderDetail(data) {
      var body = document.getElementById('detail-body');
      _detailData   = data;
      _currentRunId = data.run_id || null;
      var flakiness = {};
      if (data.run_history_with_tasks && data.run_history_with_tasks.length) {
        flakiness = _computeFlakiness(data.run_history_with_tasks);
      }
      var btnCancel = document.getElementById('btn-cancel-run');
      if (btnCancel) {
        var isActive = ['RUNNING','PENDING','QUEUED','TERMINATING'].indexOf(data.status) !== -1;
        btnCancel.style.display = isActive ? 'inline-block' : 'none';
      }
      var bc = 'badge-loading', bt = data.status;
      if (data.status === 'SUCCESS')        { bc = 'badge-success'; bt = t('successBadge').toUpperCase(); }
      if (data.status === 'FAILED')         { bc = 'badge-failed';  bt = t('failedBadge').toUpperCase(); }
      if (data.status === 'RUNNING')        { bc = 'badge-running'; bt = t('runningBadge').toUpperCase(); }
      if (data.status === 'INTERNAL_ERROR') { bc = 'badge-failed';  bt = 'ERROR'; }

      var hasDetail = data.status === 'SUCCESS' && data.tasks && data.tasks.length > 0;
      var html = '<div class="' + (hasDetail ? 'card expandable' : 'card') + '"' + (hasDetail ? ' onclick="toggleDetail()"' : '') + '>' +
        '<div class="status-row">' +
          '<span class="badge ' + bc + '">' + bt + '</span>' +
          '<span class="status-label">' + (data.task_key ? t('taskLabel') + ' ' + escHtml(data.task_key) : t('latestRun')) + '</span>' +
          (hasDetail ? '<span class="detail-arrow" id="detail-arrow">&#8250;</span>' : '') +
        '</div>' +
        (data.run_id ? '<div class="run-id">Run ID: ' + data.run_id + '</div>' : '') +
      '</div>';

      if (hasDetail) {
        html += '<div id="detail-section" style="display:none">';
        if (data.start_time && data.end_time) {
          html += '<div class="detail-card">' +
            '<div class="detail-row"><span class="detail-label">' + t('start') + '</span><span>' + escHtml(formatTime(data.start_time)) + '</span></div>' +
            '<div class="detail-row"><span class="detail-label">' + t('duration') + '</span><span>' + escHtml(formatDuration(data.end_time - data.start_time)) + '</span></div>' +
          '</div>';
        }
        html += '<div class="detail-card"><div class="detail-section-title">' + t('tasks') + '</div>';
        for (var i = 0; i < data.tasks.length; i++) {
          var task = data.tasks[i];
          var icon = task.result_state === 'SUCCESS' ? '&#10003;' : (task.result_state === 'FAILED' ? '&#10007;' : '·');
          var cls  = task.result_state === 'SUCCESS' ? 'task-ok' : (task.result_state === 'FAILED' ? 'task-fail' : 'task-other');
          var fEntry  = flakiness[task.task_key];
          var fBadge  = '';
          if (fEntry && fEntry.rate >= 0.1) {
            var fPct   = Math.round(fEntry.rate * 100);
            var fColor = fEntry.rate > 0.2 ? 'var(--red)' : 'var(--amber)';
            fBadge = '<span style="font-size:.6rem;padding:1px 4px;border-radius:3px;background:' + fColor + ';color:#fff;flex-shrink:0;margin-left:4px">' + fPct + '%</span>';
          }
          var chipHtml = '';
          if (task.task_type === 'notebook') {
            chipHtml = '<span class="task-chip" id="chip-' + escHtml(task.task_key) + '" ' +
              'data-task-type="notebook" data-notebook-path="' + escHtml(task.notebook_path || '') + '" ' +
              'onclick="event.stopPropagation();_toggleTaskCode(\'' + escHtml(task.task_key) + '\')">' +
              '{ } código</span>';
          } else if (task.task_type === 'run_job') {
            var sName = '';
            if (_dash && _dash.jobs) {
              for (var sji = 0; sji < _dash.jobs.length; sji++) {
                if (_dash.jobs[sji].job_id === task.subjob_id) { sName = _dash.jobs[sji].name; break; }
              }
            }
            if (!sName && task.subjob_id) sName = String(task.subjob_id);
            chipHtml = '<span class="task-chip" id="chip-' + escHtml(task.task_key) + '" ' +
              'data-task-type="run_job" data-subjob-id="' + (task.subjob_id || '') + '" ' +
              'data-subjob-name="' + escHtml(sName) + '" ' +
              'onclick="event.stopPropagation();_toggleTaskCode(\'' + escHtml(task.task_key) + '\')">' +
              '&#x2197; subjob</span>';
          }
          html += '<div class="task-row ' + cls + '" data-task-key="' + escHtml(task.task_key) + '">' +
            '<span class="task-icon">' + icon + '</span>' +
            '<span class="task-name">' + escHtml(task.task_key) + '</span>' +
            (task.duration_ms ? '<span class="task-dur">' + escHtml(formatDuration(task.duration_ms)) + '</span>' : '') +
            fBadge +
            chipHtml +
          '</div>';
        }
        html += '</div>'; // closes detail-card (tasks)
        if (data.tasks && data.tasks.length >= 2) {
          var hasDeps = data.tasks.some(function(tk) { return tk.depends_on && tk.depends_on.length > 0; });
          if (hasDeps) html += _renderDAG(data.tasks, flakiness);
        }
        html += '</div>'; // closes detail-section
      }

      if (data.run_history && data.run_history.length > 1) {
        html += '<div class="card"><div class="detail-section-title">' + t('runHistory') + '</div>';
        for (var hi = 0; hi < data.run_history.length; hi++) {
          var rh = data.run_history[hi];
          var rhBc = 'badge-loading', rhBt = rh.life_cycle_state || '—';
          if (rh.result_state === 'SUCCESS')       { rhBc = 'badge-success'; rhBt = t('okBadge'); }
          if (rh.result_state === 'FAILED')        { rhBc = 'badge-failed';  rhBt = t('failBadge'); }
          if (rh.life_cycle_state === 'RUNNING')   { rhBc = 'badge-running'; rhBt = t('runningBadge'); }
          html += '<div class="detail-row">' +
            '<span class="detail-label">' + escHtml(hi === 0 ? t('latest') : formatTime(rh.start_time)) + '</span>' +
            '<span>' + (rh.duration_ms ? escHtml(formatDuration(rh.duration_ms)) : '—') + '</span>' +
            '<span class="badge ' + rhBc + '">' + escHtml(rhBt) + '</span>' +
          '</div>';
        }

    function _computeLineDiff(oldText, newText) {
      var a = (oldText || '').split('\n'), b = (newText || '').split('\n');
      var m = a.length, n = b.length;
      var dp = [];
      for (var i = 0; i <= m; i++) { dp[i] = new Array(n + 1).fill(0); }
      for (var i = 1; i <= m; i++) {
        for (var j = 1; j <= n; j++) {
          dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
        }
      }
      var result = [], ii = m, jj = n;
      while (ii > 0 || jj > 0) {
        if (ii > 0 && jj > 0 && a[ii-1] === b[jj-1]) { result.unshift({ type: 'ctx', line: a[ii-1] }); ii--; jj--; }
        else if (jj > 0 && (ii === 0 || dp[ii][jj-1] >= dp[ii-1][jj])) { result.unshift({ type: 'add', line: b[jj-1] }); jj--; }
        else { result.unshift({ type: 'del', line: a[ii-1] }); ii--; }
      }
      return result;
    }

    function _renderDiffHtml(oldText, newText) {
      var lines = _computeLineDiff(oldText, newText);
      var out = '<pre class="fix-code fix-diff">';
      for (var i = 0; i < lines.length; i++) {
        var d = lines[i];
        var prefix = d.type === 'del' ? '− ' : (d.type === 'add' ? '+ ' : '  ');
        var cls = 'diff-' + d.type;
        out += '<span class="' + cls + '">' + prefix + escHtml(d.line) + '</span>';
      }
      out += '</pre>';
      return out;
    }

    // ── Gestures ──────────────────────────────────────────────────────────────
    function _gestureDelta(startX, startY, endX, endY, scrollTop, hasRowTarget) {
      var dx = endX - startX;
      var dy = endY - startY;
      if (dy > 70 && Math.abs(dx) < 40 && scrollTop === 0) return 'pull-refresh';
      // Horizontal swipe-to-switch-tabs removed: it hijacked horizontal scroll
      // when reading full notebook code in the detail view. Only swipe-on-a-row
      // (quick actions) and pull-to-refresh remain.
      if (dx < -50 && Math.abs(dy) < 40 && hasRowTarget) return 'swipe-row-left';
      return 'none';
    }

    function GestureManager(opts) {
      var self = this;
      self._sx = 0; self._sy = 0; self._rowTarget = null;
      document.addEventListener('touchstart', function(e) {
        self._sx = e.touches[0].clientX;
        self._sy = e.touches[0].clientY;
        self._rowTarget = e.target.closest ? e.target.closest('.job-row') : null;
      }, { passive: true });
      document.addEventListener('touchend', function(e) {
        var ex = e.changedTouches[0].clientX;
        var ey = e.changedTouches[0].clientY;
        var scrollTop = document.documentElement.scrollTop || document.body.scrollTop || 0;
        var action = _gestureDelta(self._sx, self._sy, ex, ey, scrollTop, !!self._rowTarget);
        if (action === 'pull-refresh'   && opts.onPullRefresh) opts.onPullRefresh();
        if (action === 'swipe-row-left' && opts.onSwipeRow)   opts.onSwipeRow(self._rowTarget);
      }, { passive: true });
    }

    function _showSwipeActions(row) {

          'onclick="event.stopPropagation();confirmTrigger(\'' + jobId + '\',\'' + escHtml(jobName) + '\')">▶</button>' +

          'onclick="event.stopPropagation();doToggleFavorite(\'' + jobId + '\')">★</button>';
      row.style.position = 'relative';

      setTimeout(function() {

    function _computeFlakiness(runsWithTasks) {
      var counts = {};
      for (var i = 0; i < runsWithTasks.length; i++) {
        var tasks = runsWithTasks[i].tasks || [];
        for (var j = 0; j < tasks.length; j++) {
          var key = tasks[j].task_key;
          if (!counts[key]) counts[key] = { total: 0, failed: 0 };
          counts[key].total++;
          var rs = tasks[j].result_state;
          if (rs === 'FAILED' || rs === 'TIMEDOUT') counts[key].failed++;
        }
      }
      var result = {};
      var keys = Object.keys(counts);
      for (var k = 0; k < keys.length; k++) {
        var c = counts[keys[k]];
        if (c.total >= 3) result[keys[k]] = { total: c.total, failed: c.failed, rate: c.failed / c.total };
      }
      return result;
    }

    // ── Task Code Viewer ─────────────────────────────────────────────────────
    function _toggleTaskCode(taskKey) {
      var panelId = 'task-code-panel-' + taskKey;
      var chip    = document.getElementById('chip-' + taskKey);
      if (!chip) return;
      var taskType     = chip.dataset.taskType     || '';
      var notebookPath = chip.dataset.notebookPath || '';
      var subjobId     = chip.dataset.subjobId ? Number(chip.dataset.subjobId) : null;
      var subjobName   = chip.dataset.subjobName   || '';

      // Close any other open panel first
      var openPanels = document.querySelectorAll('.task-code-panel');
      for (var pi = 0; pi < openPanels.length; pi++) {
        var op = openPanels[pi];
        if (op.id !== panelId) {
          var opChip = document.getElementById('chip-' + op.dataset.taskKey);
          if (opChip) opChip.classList.remove('task-chip-open');
          op.parentNode.removeChild(op);
        }
      }

      var existing = document.getElementById(panelId);
      if (existing) {
        chip.classList.remove('task-chip-open');
        existing.parentNode.removeChild(existing);
        return;
      }

      chip.classList.add('task-chip-open');
      var taskRow = document.querySelector('[data-task-key="' + taskKey + '"]');
      if (!taskRow) return;

      var panel = document.createElement('div');
      panel.id                   = panelId;
      panel.className            = 'task-code-panel';
      panel.dataset.taskKey      = taskKey;
      panel.dataset.notebookPath = notebookPath;

      if (taskType === 'run_job') {
        panel.innerHTML = _renderSubjobPanel(subjobId, subjobName);
      } else {
        panel.innerHTML = _renderNotebookLoading(notebookPath);
        var _pid  = panelId;
        var _path = notebookPath;
        google.script.run
          .withSuccessHandler(function(r) { _onNotebookPreview(_pid, r, false); })
          .withFailureHandler(function(e) { _onNotebookPreview(_pid, { error: (e && e.message) || 'Error', total_lines: 0, lines: [], truncated: false }, false); })
          .getNotebookPreview(_path, false);

    function _onNotebookPreview(panelId, result, full) {

    function _highlightPython(text) {
      var comments = [];
      text = text.replace(/(#[^\n]*)/g, function(m) {
        comments.push(m);
        return '\x00COMMENT' + (comments.length - 1) + '\x00';
      });
      var kws = ['from','import','def','class','return','if','else','elif','for','in','not','and','or','True','False','None','with','as','try','except','raise','pass','lambda','yield'];
      for (var ki = 0; ki < kws.length; ki++) {
        text = text.replace(new RegExp('\\b(' + kws[ki] + ')\\b', 'g'), '<span class="hl-kw">$1</span>');
      }
      text = text.replace(/\x00COMMENT(\d+)\x00/g, function(_, i) {
        return '<span class="hl-comment">' + comments[+i] + '</span>';
      });
      return text;
    }

    function doApplyFix(panelId) {
      var pid = panelId || 'fix-panel';
      var fix = _fixByPanel[pid];
      if (!fix || !fix.notebook_path || !fix.find) return;
      var btn = document.getElementById('btn-apply-' + pid);
      if (!btn || btn.disabled) return;  // already applying / applied → ignore extra taps
      if (!confirm((_lang === 'es' ? 'Aplicar fix en ' : 'Apply fix in ') + fix.notebook_path + '?\n\n' + (_lang === 'es' ? 'Esta acción modifica el notebook directamente.' : 'This action modifies the notebook directly.'))) return;
      btn.disabled = true;
      btn.innerHTML = SPIN;
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showToast(t('fixAppliedToast'));
            btn.textContent = t('fixApplied');
            btn.disabled = true;  // stays locked: fix already applied
            // Lock this task's Think Fix too — no sense re-diagnosing a patched notebook.
            // panelId is always 'fix-panel-<taskKey>' → Think Fix btn is 'btn-think-fix-<taskKey>'.
            var thinkBtn = document.getElementById('btn-think-fix-' + pid.replace(/^fix-panel-/, ''));
            if (thinkBtn) { thinkBtn.disabled = true; thinkBtn.title = t('fixApplied'); }
          } else {
            showToast('⚠ ' + result.error);
            btn.disabled = false;
            btn.textContent = t('applyFix');
          }
        })
        .withFailureHandler(function(e) {
          showToast('⚠ ' + e.message);
          btn.disabled = false;
          btn.textContent = t('applyFix');
        })
        .aplicarFix(fix.notebook_path, fix.find, fix.replace);
    }

    function renderMd(s) {
      if (!s) return '';
      var lines = String(s).split('\n');
      var out = '', inCode = false;
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (line.startsWith('```')) {
          if (!inCode) {
            out += '<pre style="background:#0f172a;padding:8px 10px;border-radius:6px;overflow-x:auto;font-size:.72rem;margin:6px 0;white-space:pre"><code style="color:#a5f3fc">';
            inCode = true;
          } else {
            out += '</code></pre>';
            inCode = false;
          }
          continue;
        }
        var esc = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        if (inCode) {
          out += esc + '\n';
        } else {
          esc = esc.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');

          out += esc + '<br>';
        }
      }
      if (inCode) out += '</code></pre>';
      return out;
    }

    // ── V6: Global search ───────────────────────────────────────────────────────
    function _globalSearch(query, jobs, runs) {
      var q = (query || '').toLowerCase().trim();
      if (!q) return [];
      var out = [];
      (jobs || []).forEach(function(j) {
        if (String(j.name || '').toLowerCase().indexOf(q) !== -1 || String(j.job_id).indexOf(q) !== -1)
          out.push({ type: 'job', job_id: j.job_id, job_name: j.name });
      });
      (runs || []).forEach(function(r) {
        if (String(r.run_id).indexOf(q) !== -1 || String(r.job_name || '').toLowerCase().indexOf(q) !== -1)
          out.push({ type: 'run', job_id: r.job_id, job_name: r.job_name, run_id: r.run_id });
      });
      return out;
    }
    function openSearch() {
      var ov = document.getElementById('search-overlay');

    function doGlobalSearch() {

      if (!res.length) { el.innerHTML = '<div class="empty-msg">' + t('noResults') + '</div>'; return; }
      el.innerHTML = res.map(function(r) {

          '<div style="flex:1;min-width:0"><div style="font-size:.85rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + escHtml(r.job_name) + '</div>' +

    function _paramsToMap(pairs) {
      var map = {};
      (pairs || []).forEach(function(p) {
        var k = (p && p.key != null) ? String(p.key).trim() : '';
        if (k) map[k] = (p.value != null) ? String(p.value) : '';
      });

    }

        '<button onclick="this.parentNode.remove()" style="background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer;padding:0 4px">&times;</button>';

    // ── V6: Run comparison ──────────────────────────────────────────────────────
    function _buildRunComparison(runA, runB) {
      var keys = [], seen = {};
      function addKeys(run) { ((run && run.tasks) || []).forEach(function(t2) { if (!seen[t2.task_key]) { seen[t2.task_key] = true; keys.push(t2.task_key); } }); }
      addKeys(runA); addKeys(runB);
      function lookup(run, key) { var arr = (run && run.tasks) || []; for (var i = 0; i < arr.length; i++) if (arr[i].task_key === key) return arr[i]; return null; }
      return keys.map(function(k) {
        var a = lookup(runA, k), b = lookup(runB, k);
        var aDur = a ? (a.duration_ms || 0) : null;
        var bDur = b ? (b.duration_ms || 0) : null;
        return {
          task_key: k,
          a_state:  a ? (a.result_state || '') : null,
          b_state:  b ? (b.result_state || '') : null,
          a_dur:    aDur, b_dur: bDur,
          delta_ms: (aDur != null && bDur != null) ? (bDur - aDur) : null
        };
      });
    }
    function _cmpRunLabel(run) {
      var st = run.result_state || run.life_cycle_state || '?';
      return formatTime(run.start_time) + ' · ' + st;
    }
    function _renderComparePicker(runs) {
      var opts = runs.map(function(r, i) { return '<option value="' + i + '">' + escHtml(_cmpRunLabel(r)) + '</option>'; }).join('');
      var selStyle = 'flex:1;min-width:0;background:var(--surf2);border:1px solid var(--bord);border-radius:6px;padding:6px 8px;color:var(--text);font-size:.74rem;outline:none';
      return '<div class="card" style="margin-top:12px">' +
        '<div class="detail-section-title">' + t('compareRuns') + '</div>' +
        '<div style="display:flex;gap:6px;align-items:center;margin-bottom:10px">' +
          '<select id="run-cmp-a" onchange="_renderRunComparison()" style="' + selStyle + '">' + opts + '</select>' +
          '<span style="color:var(--dim);font-size:.75rem">vs</span>' +
          '<select id="run-cmp-b" onchange="_renderRunComparison()" style="' + selStyle + '">' + opts + '</select>' +
        '</div>' +
        '<div id="run-cmp-result"></div></div>';
    }
    function _cmpStateColor(s) {
      return s === 'SUCCESS' ? 'var(--green)' : (s === 'FAILED' || s === 'TIMEDOUT' ? 'var(--red)' : 'var(--dim)');
    }
    function _renderRunComparison() {
      if (!_detailData) return;
      var runs = _detailData.run_history_with_tasks || [];
      var ai = parseInt(document.getElementById('run-cmp-a').value, 10);
      var bi = parseInt(document.getElementById('run-cmp-b').value, 10);
      var el = document.getElementById('run-cmp-result');
      if (ai === bi) { el.innerHTML = '<div style="color:var(--dim);font-size:.74rem;padding:6px 0">' + t('compareHint') + '</div>'; return; }
      var rows = _buildRunComparison(runs[ai], runs[bi]);
      var th    = 'font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;padding:4px 4px;text-align:right';
      var thTask= 'font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;padding:4px 4px;text-align:left';
      var td    = 'font-size:.7rem;padding:4px 4px;border-top:1px solid var(--bord);text-align:right';
      // table-layout:fixed + columnas numéricas angostas → la columna Task toma el resto y trunca con ellipsis
      var tdTask= 'font-size:.7rem;padding:4px 4px;border-top:1px solid var(--bord);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0';
      var html = '<table style="width:100%;border-collapse:collapse;table-layout:fixed">' +
        '<colgroup><col><col style="width:46px"><col style="width:46px"><col style="width:48px"></colgroup>' +
        '<tr><th style="' + thTask + '">' + t('colTask') + '</th><th style="' + th + '">A</th><th style="' + th + '">B</th><th style="' + th + '">' + t('colDelta') + '</th></tr>';
      rows.forEach(function(r) {
        var aTxt = r.a_dur != null ? formatDuration(r.a_dur) : '—';
        var bTxt = r.b_dur != null ? formatDuration(r.b_dur) : '—';
        var dTxt = '—', dColor = 'var(--dim)';
        if (r.delta_ms != null) {
          var sec = Math.round(r.delta_ms / 1000);
          dTxt = (sec > 0 ? '+' : '') + sec + 's';
          dColor = sec > 0 ? 'var(--red)' : (sec < 0 ? 'var(--green)' : 'var(--dim)');
        }
        html += '<tr>' +
          '<td style="' + tdTask + '" title="' + escHtml(r.task_key) + '"><span style="display:inline-block;width:6px;height:6px;border-radius:1px;background:' + _cmpStateColor(r.b_state || r.a_state) + ';margin-right:5px;flex-shrink:0"></span>' + escHtml(r.task_key) + '</td>' +
          '<td style="' + td + ';color:var(--muted)">' + aTxt + '</td>' +
          '<td style="' + td + ';color:var(--muted)">' + bTxt + '</td>' +
          '<td style="' + td + ';color:' + dColor + ';font-weight:600">' + dTxt + '</td></tr>';
      });
      html += '</table>';
      el.innerHTML = html;
    }

    function renderClusters(clusters) {
      if (!clusters || !clusters.length) {
        document.getElementById('clusters-list').innerHTML = '<div class="empty-msg">' + t('noClusters') + '</div>';
        return;

      var html = '';

        if (state === 'RUNNING')    { badgeCls = 'badge-success'; badgeTxt = t('clusterRunning'); }
        else if (state === 'TERMINATED') { badgeCls = 'badge-loading'; badgeTxt = t('clusterTerminated'); }
        else if (state === 'ERROR') { badgeCls = 'badge-failed';  badgeTxt = t('clusterError'); }
        else                        { badgeCls = 'badge-running'; badgeTxt = t('clusterPending'); }

        var actionBtn = '';
        if (state === 'RUNNING') {
          actionBtn = '<button class="btn-cluster-action stop" onclick="doTerminateCluster(' + escHtml(JSON.stringify(c.cluster_id)) + ',' + escHtml(JSON.stringify(c.cluster_name)) + ')">' + t('terminateCluster') + '</button>';

        }

        var meta = [];
        if (c.num_workers !== undefined) meta.push(c.num_workers + ' ' + t('clusterWorkers'));
        if (c.creator_user_name) meta.push(c.creator_user_name);

        html += '<div class="cluster-row">' +
          '<div class="cluster-info">' +
            '<div class="cluster-name">' + escHtml(c.cluster_name) + '</div>' +
            (meta.length ? '<div class="cluster-meta">' + escHtml(meta.join(' · ')) + '</div>' : '') +
          '</div>' +
          '<span class="badge ' + badgeCls + '">' + badgeTxt + '</span>' +
          actionBtn +

      });
